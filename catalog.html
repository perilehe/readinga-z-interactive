<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Catalog - Reading A-Z Interactive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
      position: relative;
    }
    .header h1 { font-size: 1.8em; margin-bottom: 6px; }
    .header p { opacity: 0.9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 0.95em; }
    .nav-link {
      position: absolute;
      top: 15px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.9em;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 1; }

    .summary {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 140px;
      background: white;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .summary-card .number {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }
    .summary-card .label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #888;
      font-size: 0.85em;
      margin-top: 4px;
    }

    .catalog {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px 40px;
    }
    .catalog h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    th {
      background: #f0f1f5;
      text-align: left;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8em;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 14px 16px;
      border-top: 1px solid #f0f1f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.9em;
      color: #333;
    }
    tr:hover td { background: #fafbff; }
    tr a { text-decoration: none; color: inherit; }
    .book-num {
      font-weight: 700;
      color: #667eea;
      font-size: 0.95em;
    }
    .book-title {
      font-family: Georgia, serif;
      font-weight: 600;
      color: #333;
    }
    .book-title:hover { color: #667eea; }
    .stars-cell { white-space: nowrap; }
    .stars-bar {
      display: inline-block;
      width: 80px;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      vertical-align: middle;
      margin-right: 8px;
    }
    .stars-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .stars-text { font-size: 0.85em; color: #888; }
    .stars-text .earned { color: #667eea; font-weight: 600; }
    .date-cell { color: #999; font-size: 0.85em; }

    @media (max-width: 600px) {
      th:nth-child(3), td:nth-child(3) { display: none; }
      .summary { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="nav-link">&larr; Bookshelf</a>
    <h1>&#128203; Book Catalog</h1>
    <p>All books with progress tracking</p>
  </div>

  <div class="summary" id="summary">
    <div class="summary-card">
      <div class="number" id="totalBooks">-</div>
      <div class="label">Total Books</div>
    </div>
    <div class="summary-card">
      <div class="number" id="totalStarsEarned">-</div>
      <div class="label">Stars Earned</div>
    </div>
    <div class="summary-card">
      <div class="number" id="totalStarsPossible">-</div>
      <div class="label">Stars Possible</div>
    </div>
    <div class="summary-card">
      <div class="number" id="completionPct">-</div>
      <div class="label">Completion</div>
    </div>
  </div>

  <div class="catalog">
    <h2>&#128218; Reading List</h2>
    <table>
      <thead>
        <tr>
          <th style="width:60px">No.</th>
          <th>Book Title</th>
          <th style="width:120px">Added</th>
          <th style="width:160px">Progress</th>
        </tr>
      </thead>
      <tbody id="catalogBody">
        <tr><td colspan="4" style="text-align:center;padding:40px;color:#999;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    var books = [
      { id: 'a-new-skyline', title: 'A New Skyline', author: 'Susan Lennox', date: '2025-01-01' },
      { id: 'ancient-greek-gods', title: 'Ancient Greek and Roman Gods', author: 'Cheryl Reifsnyder', date: '2025-01-02' },
      { id: 'ancient-mesopotamia', title: 'Ancient Mesopotamia', author: 'Susan Lennox', date: '2025-01-03' },
      { id: 'color-blindness', title: 'Color Blindness', author: 'Cheryl Reifsnyder', date: '2025-01-04' },
      { id: 'climbing-mountains', title: 'Climbing Mountains', author: 'Kathie Lester', date: '2025-01-05' },
      { id: 'atlantic-crossing', title: 'Atlantic Crossing', author: 'Troy Wolff', date: '2025-01-06' },
      { id: 'hurricanes', title: 'Hurricanes', author: 'Shaun Taylor', date: '2025-06-20' },
      { id: 'mummies', title: 'Mummies', author: 'Lisa Ing', date: '2025-06-25' },
      { id: 'nobel-prize', title: 'The Nobel Prize', author: 'Evan Russell', date: '2025-07-01' },
      { id: 'curiosity-on-mars', title: 'Curiosity on Mars', author: 'John Perritano', date: '2025-07-15' },
      { id: 'desert-people', title: 'Desert People', author: 'David Meissner', date: '2025-07-15' },
      { id: 'earthquakes-volcanoes-tsunamis', title: 'Earthquakes, Volcanoes, and Tsunamis', author: 'Elizabeth Austin', date: '2025-07-15' }
    ];

    function calculateTotalStars(data) {
      var activities = data.activities || [];
      var total = 0;
      activities.forEach(function(act) {
        switch (act) {
          case 'sequence':
            total += (data.sequenceEvents || []).length;
            break;
          case 'evidence':
            total += (data.questions || []).filter(function(q) { return q.level !== 3; }).length;
            break;
          case 'summarize':
            total += (data.summarizeActivities || []).length * 2;
            break;
          case 'vocabulary':
            total += (data.vocabulary || []).length * 2;
            break;
          case 'typing':
            total += (data.vocabulary || []).length + 1;
            break;
          case 'authorPurpose':
            total += (data.authorPurpose && data.authorPurpose.purposes || []).length;
            break;
          case 'kwls':
            total += 2;
            break;
          case 'pronoun':
            total += (data.pronounAgreement || []).length;
            break;
          case 'problemSolution':
            total += (data.problemSolution || []).length;
            break;
          case 'grammar':
            if (data.grammar) {
              total += (data.grammar.wordBuilding || []).length;
              total += (data.grammar.homophones || []).length;
              total += (data.grammar.exercises || []).length;
            }
            break;
        }
      });
      return total;
    }

    function getEarnedStars(bookId) {
      var saved = localStorage.getItem('stars_' + bookId);
      if (!saved) return 0;
      try {
        var stars = JSON.parse(saved);
        return Object.values(stars).filter(function(v) { return v; }).length;
      } catch (e) { return 0; }
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    async function loadCatalog() {
      var tbody = document.getElementById('catalogBody');
      tbody.innerHTML = '';
      var grandTotalEarned = 0;
      var grandTotalPossible = 0;

      for (var i = 0; i < books.length; i++) {
        var book = books[i];
        var num = 'W' + String(i + 1).padStart(2, '0');
        var totalStars = 0;
        var earnedStars = getEarnedStars(book.id);

        try {
          var resp = await fetch('books/' + book.id + '.json');
          var data = await resp.json();
          totalStars = calculateTotalStars(data);
        } catch (e) {
          console.warn('Could not load', book.id, e);
        }

        grandTotalEarned += earnedStars;
        grandTotalPossible += totalStars;

        var pct = totalStars > 0 ? Math.round((earnedStars / totalStars) * 100) : 0;

        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td><span class="book-num">' + num + '</span></td>' +
          '<td><a href="reader.html?book=' + book.id + '" class="book-title">' + book.title + '</a></td>' +
          '<td class="date-cell">' + formatDate(book.date) + '</td>' +
          '<td class="stars-cell">' +
            '<span class="stars-bar"><span class="stars-fill" style="width:' + pct + '%"></span></span>' +
            '<span class="stars-text"><span class="earned">' + earnedStars + '</span>/' + totalStars + '</span>' +
          '</td>';
        tbody.appendChild(tr);
      }

      document.getElementById('totalBooks').textContent = books.length;
      document.getElementById('totalStarsEarned').textContent = grandTotalEarned;
      document.getElementById('totalStarsPossible').textContent = grandTotalPossible;
      var overallPct = grandTotalPossible > 0 ? Math.round((grandTotalEarned / grandTotalPossible) * 100) : 0;
      document.getElementById('completionPct').textContent = overallPct + '%';
    }

    loadCatalog();
  </script>
</body>
</html>
