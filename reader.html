<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader - Loading...</title>
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>

  <!-- Header -->
  <div class="header" id="bookHeader">
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
      <div>
        <h1 id="bookTitle" style="margin:0;">Loading...</h1>
        <div class="subtitle" id="bookSubtitle"></div>
      </div>
      <div class="star-counter-inline" id="starCounter">
        ⭐ <span id="starCount">0</span> / <span id="totalStars">0</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
    </div>
    <div class="level-badge" id="bookLevel"></div>
  </div>

  <!-- Dynamic Tab Navigation (populated by JS) -->
  <div class="tab-nav" id="tabNav"></div>

  <!-- Dynamic Content Area (populated by JS modules) -->
  <div class="main-content" id="mainContent"></div>

  <!-- Quiz Popup (reused for vocab in-text stars) -->
  <div class="quiz-overlay" id="quizOverlay"></div>
  <div class="quiz-popup" id="quizPopup">
    <span class="quiz-close" id="quizClose">&times;</span>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-context" id="quizContext"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>

  <!-- Scripts: stars first, then app, then all modules -->
  <script src="js/stars.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/sequence.js?v=3"></script>
  <script src="js/evidence.js?v=3"></script>
  <script src="js/summarize.js?v=3"></script>
  <script src="js/vocabulary.js?v=3"></script>
  <script src="js/typing.js?v=3"></script>
  <script src="js/problemSolution.js?v=3"></script>
  <script src="js/authorPurpose.js?v=3"></script>
  <script src="js/kwls.js?v=3"></script>
  <script src="js/pronoun.js?v=3"></script>
</body>
</html>
