<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading A-Z Interactive Bookshelf</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 2em;
      margin-bottom: 8px;
    }
    .header p {
      opacity: 0.9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .bookshelf {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .book-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .book-cover {
      height: 140px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.4em;
      font-weight: bold;
      text-align: center;
      padding: 15px;
      line-height: 1.3;
    }
    .book-info {
      padding: 18px;
    }
    .book-info h3 {
      font-family: Georgia, serif;
      color: #333;
      margin-bottom: 6px;
      font-size: 1.1em;
    }
    .book-info .author {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #777;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .book-info .level {
      display: inline-block;
      background: #e8eaf6;
      color: #667eea;
      padding: 3px 10px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8em;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Reading A-Z Interactive Bookshelf</h1>
    <p>Interactive reading activities for leveled books</p>
  </div>

  <div class="bookshelf" id="bookshelf">
    <!-- Books are loaded dynamically -->
  </div>

  <script>
    // List of available books
    const books = [
      {
        id: 'a-new-skyline',
        title: 'A New Skyline',
        author: 'Susan Lennox',
        level: 'W'
      },
      {
        id: 'ancient-greek-gods',
        title: 'Ancient Greek and Roman Gods',
        author: 'Cheryl Reifsnyder',
        level: 'W'
      },
      {
        id: 'ancient-mesopotamia',
        title: 'Ancient Mesopotamia',
        author: 'Susan Lennox',
        level: 'W'
      },
      {
        id: 'color-blindness',
        title: 'Color Blindness',
        author: 'Cheryl Reifsnyder',
        level: 'W'
      },
      {
        id: 'climbing-mountains',
        title: 'Climbing Mountains: An Interview with Erik Weihenmayer',
        author: 'Kathie Lester',
        level: 'W'
      },
      {
        id: 'atlantic-crossing',
        title: 'Atlantic Crossing',
        author: 'Troy Wolff',
        level: 'W'
      },
      {
        id: 'hurricanes',
        title: 'Hurricanes',
        author: 'Shaun Taylor',
        level: 'W'
      },
      {
        id: 'mummies',
        title: 'Mummies',
        author: 'Lisa Ing',
        level: 'W'
      },
      {
        id: 'nobel-prize',
        title: 'The Nobel Prize',
        author: 'Evan Russell',
        level: 'W'
      }
    ];

    const shelf = document.getElementById('bookshelf');

    if (books.length === 0) {
      shelf.innerHTML = '<div class="empty-state"><h2>No books yet</h2><p>Add book JSON files to the books/ folder.</p></div>';
    } else {
      books.forEach(book => {
        const card = document.createElement('a');
        card.className = 'book-card';
        card.href = `reader.html?book=${book.id}`;
        card.innerHTML = `
          <div class="book-cover">${book.title}</div>
          <div class="book-info">
            <h3>${book.title}</h3>
            <div class="author">by ${book.author}</div>
            <span class="level">Level ${book.level}</span>
          </div>
        `;
        shelf.appendChild(card);
      });
    }
  </script>
</body>
</html>
