<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading A-Z Interactive Bookshelf</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
      position: relative;
    }
    .header h1 {
      font-size: 2em;
      margin-bottom: 8px;
    }
    .header p {
      opacity: 0.9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .bookshelf {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .book-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .book-cover {
      height: 140px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.4em;
      font-weight: bold;
      text-align: center;
      padding: 15px;
      line-height: 1.3;
    }
    .book-info {
      padding: 18px;
    }
    .book-info h3 {
      font-family: Georgia, serif;
      color: #333;
      margin-bottom: 6px;
      font-size: 1.1em;
    }
    .book-info .author {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #777;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
    .book-info .level {
      display: inline-block;
      background: #e8eaf6;
      color: #667eea;
      padding: 3px 10px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8em;
      font-weight: 600;
    }
    .book-num {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 2px 8px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.7em;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .book-card-stars {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.78em;
      color: #999;
      margin-top: 8px;
    }
    .book-card-stars .earned { color: #667eea; font-weight: 600; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Progress controls */
    #progress-controls {
      position: absolute;
      top: 15px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .catalog-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.85em;
      text-decoration: none;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    .catalog-link:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

    .progress-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    .progress-btn:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

    .btn-icon {
      font-size: 1.1em;
    }

    .btn-label {
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .btn-label {
        display: none;
      }
      .progress-btn {
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Reading A-Z Interactive Bookshelf</h1>
    <p>Interactive reading activities for leveled books</p>
    <div id="progress-controls">
      <a href="catalog.html" class="catalog-link">
        <span class="btn-icon">📋</span>
        <span class="btn-label">Catalog</span>
      </a>
    </div>
  </div>

  <div class="bookshelf" id="bookshelf">
    <!-- Books are loaded dynamically -->
  </div>

      },
      {

      },
      {
        id: 'pirates-and-privateers',
        title: 'Pirates and Privateers',
        author: 'Mary Fifield',
        level: 'W',
        num: 'W29',
        date: '2025-07-22'
      }
    ];

    const shelf = document.getElementById('bookshelf');

    if (books.length === 0) {
      shelf.innerHTML = '<div class="empty-state"><h2>No books yet</h2><p>Add book JSON files to the books/ folder.</p></div>';
    } else {
      books.forEach(book => {
        const card = document.createElement('a');
        card.className = 'book-card';
        card.href = `reader.html?book=${book.id}`;
        const earned = getEarnedStars(book.id);
        card.innerHTML = `
          <div class="book-cover">${book.title}</div>
          <div class="book-info">
            <span class="book-num">${book.num}</span>
            <h3>${book.title}</h3>
            <div class="author">by ${book.author}</div>
            <span class="level">Level ${book.level}</span>
            <div class="book-card-stars">⭐ <span class="earned">${earned}</span> earned</div>
          </div>
        `;
        shelf.appendChild(card);
      });
    }

    function getEarnedStars(bookId) {
      var saved = localStorage.getItem('stars_' + bookId);
      if (!saved) return 0;
      try {
        var stars = JSON.parse(saved);
        return Object.values(stars).filter(function(v) { return v; }).length;
      } catch (e) { return 0; }
    }
  </script>
  <script src="js/progress-io.js?v=9"></script>
</body>
</html>
